kind = "web"
previewPath = "/"
title = "ShopPulse"
version = "1.0.0"
id = "artifacts/shoppulse"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18607

[services.development]
run = "pnpm --filter @workspace/shoppulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shoppulse", "run", "build" ]
serve = "static"
publicDir = "artifacts/shoppulse/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18607"
BASE_PATH = "/"
