openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ShopPulse API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: settings
    description: Shop settings and role configuration
  - name: categories
    description: Product categories
  - name: products
    description: Product catalog and inventory
  - name: sales
    description: POS sales and void/refund
  - name: customers
    description: Debt and credit ledger
  - name: expenses
    description: Shop expenses
  - name: dashboard
    description: Overview and analytics
  - name: ai
    description: AI business reports
  - name: backup
    description: Backup and restore
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get shop settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update shop settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: barcode
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}/restock:
    post:
      operationId: restockProduct
      tags: [products]
      summary: Log a restock delivery for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestockInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}/correction:
    post:
      operationId: correctProductStock
      tags: [products]
      summary: Log a stock correction (damage, loss, adjustment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrectionInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}/movements:
    get:
      operationId: listProductMovements
      tags: [products]
      summary: List stock movements for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List debt/credit customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create credit customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer with ledger history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
        "404":
          description: Not found

  /customers/{id}/payments:
    post:
      operationId: recordCustomerPayment
      tags: [customers]
      summary: Record a partial or full payment against a customer's balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Ledger entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerLedgerEntry"

  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List sales
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/SaleStatus"
        - name: paymentMethod
          in: query
          schema:
            $ref: "#/components/schemas/PaymentMethod"
        - name: search
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Checkout a new sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleInput"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "400":
          description: Invalid sale

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "404":
          description: Not found

  /sales/{id}/void:
    post:
      operationId: voidSale
      tags: [sales]
      summary: Void/refund a sale (owner only). Restocks inventory and reverses debt, keeps the original record visible.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoidInput"
      responses:
        "200":
          description: Voided sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "403":
          description: Forbidden for current role
        "404":
          description: Not found

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses
      parameters:
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/ExpenseCategory"
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Overview dashboard summary. Profit fields are omitted entirely when the active role is attendant.
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /ai-reports:
    get:
      operationId: listAiReports
      tags: [ai]
      summary: List previously generated AI business reports (owner only)
      responses:
        "200":
          description: AI reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiReport"
        "403":
          description: Forbidden for current role

  /ai-reports/generate:
    post:
      operationId: generateAiReport
      tags: [ai]
      summary: Generate a new AI business report from anonymized daily telemetry (owner only)
      responses:
        "201":
          description: Generated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiReport"
        "403":
          description: Forbidden for current role

  /backup/export:
    get:
      operationId: exportBackup
      tags: [backup]
      summary: Export a full timestamped JSON backup bundle
      responses:
        "200":
          description: Backup bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupBundle"

  /backup/import:
    post:
      operationId: importBackup
      tags: [backup]
      summary: Validate and restore a previously exported backup bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupBundle"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Invalid backup file

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Role:
      type: string
      enum: [owner, attendant]

    PaymentMethod:
      type: string
      enum: [cash, transfer, card, credit]

    SaleStatus:
      type: string
      enum: [completed, voided]

    ExpenseCategory:
      type: string
      enum: [rent, power, staff, transport, logistics, other]

    StockMovementType:
      type: string
      enum: [sale, void, restock, correction]

    Settings:
      type: object
      required:
        [id, shopName, ownerLabel, attendantLabel, activeRole, lowStockThreshold]
      properties:
        id:
          type: integer
        shopName:
          type: string
        ownerLabel:
          type: string
        attendantLabel:
          type: string
        activeRole:
          $ref: "#/components/schemas/Role"
        lowStockThreshold:
          type: integer

    SettingsUpdate:
      type: object
      properties:
        shopName:
          type: string
        ownerLabel:
          type: string
        attendantLabel:
          type: string
        activeRole:
          $ref: "#/components/schemas/Role"
        lowStockThreshold:
          type: integer

    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    Product:
      type: object
      required:
        [
          id,
          name,
          categoryId,
          categoryName,
          barcode,
          sellingPriceCents,
          costPriceCents,
          stockLevel,
          lowStockThreshold,
          isLowStock,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: integer
        name:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        barcode:
          type: ["string", "null"]
        sellingPriceCents:
          type: integer
        costPriceCents:
          type: ["integer", "null"]
          description: Omitted (null) when the active role is attendant
        stockLevel:
          type: integer
        lowStockThreshold:
          type: integer
        isLowStock:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required:
        [name, categoryId, sellingPriceCents, costPriceCents, stockLevel]
      properties:
        name:
          type: string
          minLength: 1
        categoryId:
          type: integer
        barcode:
          type: string
        sellingPriceCents:
          type: integer
          minimum: 0
        costPriceCents:
          type: integer
          minimum: 0
        stockLevel:
          type: integer
          minimum: 0
        lowStockThreshold:
          type: integer
          minimum: 0

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        categoryId:
          type: integer
        barcode:
          type: string
        sellingPriceCents:
          type: integer
          minimum: 0
        costPriceCents:
          type: integer
          minimum: 0
        lowStockThreshold:
          type: integer
          minimum: 0

    RestockInput:
      type: object
      required: [quantity, costPriceCents]
      properties:
        quantity:
          type: integer
          minimum: 1
        costPriceCents:
          type: integer
          minimum: 0
        note:
          type: string

    CorrectionInput:
      type: object
      required: [quantityChange, reason]
      properties:
        quantityChange:
          type: integer
        reason:
          type: string
          minLength: 1

    StockMovement:
      type: object
      required: [id, productId, type, quantityChange, reason, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        type:
          $ref: "#/components/schemas/StockMovementType"
        quantityChange:
          type: integer
        reason:
          type: ["string", "null"]
        referenceSaleId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    Customer:
      type: object
      required: [id, name, phone, balanceCents, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        balanceCents:
          type: integer
        createdAt:
          type: string
          format: date-time

    CustomerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string

    CustomerLedgerEntry:
      type: object
      required: [id, customerId, type, amountCents, note, saleId, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        type:
          type: string
          enum: [charge, payment]
        amountCents:
          type: integer
        note:
          type: ["string", "null"]
        saleId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    CustomerDetail:
      allOf:
        - $ref: "#/components/schemas/Customer"
        - type: object
          required: [ledger]
          properties:
            ledger:
              type: array
              items:
                $ref: "#/components/schemas/CustomerLedgerEntry"

    PaymentInput:
      type: object
      required: [amountCents]
      properties:
        amountCents:
          type: integer
          minimum: 1
        note:
          type: string

    SaleItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1

    SalePaymentInput:
      type: object
      required: [method, amountCents]
      properties:
        method:
          $ref: "#/components/schemas/PaymentMethod"
        amountCents:
          type: integer
          minimum: 1

    SaleInput:
      type: object
      required: [items, payments]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SaleItemInput"
        payments:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SalePaymentInput"
        discountCents:
          type: integer
          minimum: 0
        customerId:
          type: integer
          description: Required if any payment line uses the credit method

    SaleItem:
      type: object
      required: [id, productId, productName, quantity, unitPriceCents, lineTotalCents]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPriceCents:
          type: integer
        lineTotalCents:
          type: integer

    SalePayment:
      type: object
      required: [id, method, amountCents]
      properties:
        id:
          type: integer
        method:
          $ref: "#/components/schemas/PaymentMethod"
        amountCents:
          type: integer

    Sale:
      type: object
      required:
        [
          id,
          createdAt,
          operatorRole,
          status,
          items,
          payments,
          subtotalCents,
          discountCents,
          totalCents,
          customerId,
          customerName,
          voidReason,
          voidedAt,
        ]
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
        operatorRole:
          $ref: "#/components/schemas/Role"
        status:
          $ref: "#/components/schemas/SaleStatus"
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/SalePayment"
        subtotalCents:
          type: integer
        discountCents:
          type: integer
        totalCents:
          type: integer
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        voidReason:
          type: ["string", "null"]
        voidedAt:
          type: ["string", "null"]
          format: date-time

    VoidInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1

    Expense:
      type: object
      required: [id, category, description, amountCents, expenseDate, createdAt]
      properties:
        id:
          type: integer
        category:
          $ref: "#/components/schemas/ExpenseCategory"
        description:
          type: string
        amountCents:
          type: integer
        expenseDate:
          type: string
        createdAt:
          type: string
          format: date-time

    ExpenseInput:
      type: object
      required: [category, description, amountCents, expenseDate]
      properties:
        category:
          $ref: "#/components/schemas/ExpenseCategory"
        description:
          type: string
          minLength: 1
        amountCents:
          type: integer
          minimum: 0
        expenseDate:
          type: string

    RevenuePoint:
      type: object
      required: [date, revenueCents]
      properties:
        date:
          type: string
        revenueCents:
          type: integer

    DashboardSummary:
      type: object
      required:
        [
          todayRevenueCents,
          activeDebtAccounts,
          totalDebtCents,
          monthlyExpensesCents,
          todayProfitCents,
          lowStockProducts,
          recentSales,
          revenueChart,
        ]
      properties:
        todayRevenueCents:
          type: integer
        activeDebtAccounts:
          type: integer
        totalDebtCents:
          type: integer
        monthlyExpensesCents:
          type: integer
        todayProfitCents:
          type: ["integer", "null"]
          description: Null when the active role is attendant
        lowStockProducts:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        recentSales:
          type: array
          items:
            $ref: "#/components/schemas/Sale"
        revenueChart:
          type: array
          items:
            $ref: "#/components/schemas/RevenuePoint"

    AiReport:
      type: object
      required: [id, createdAt, content]
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
        content:
          type: string

    BackupBundle:
      type: object
      description: Full JSON export of all shop data, used for backup/restore
      additionalProperties: true

    ImportResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
